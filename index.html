<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zombie Tower Defense</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;display:flex;flex-direction:column;align-items:center;user-select:none;transition:background-color 0.3s,color 0.3s;overflow-x:hidden;}
body.light-theme{background:#f0f4f8;color:#1a202c;}
body.dark-theme{background:#080c12;color:#e8edf2;}
.glass-panel.light-theme,.light-theme .glass-panel{background:linear-gradient(145deg,#fff,#edf2f7);border:1px solid #cbd5e0;box-shadow:0 10px 30px rgba(0,0,0,0.08);}
.glass-panel.dark-theme,.dark-theme .glass-panel{background:linear-gradient(145deg,#121820,#1a2030);border:1px solid #2a3240;box-shadow:0 10px 30px rgba(0,0,0,0.5);}
button,select{padding:8px 12px;border-radius:8px;cursor:pointer;font-weight:700;font-size:13px;transition:all 0.15s;border:1px solid transparent;}
.light-theme button,.light-theme select{background:#edf2f7;color:#2d3748;border-color:#cbd5e0;}
.dark-theme button,.dark-theme select{background:#1a2030;color:#c8d0dc;border-color:#2a3240;}
.light-theme button:hover{background:#e2e8f0;transform:translateY(-1px);}
.dark-theme button:hover{background:#222c3c;border-color:#4a6080;transform:translateY(-1px);}
button.selected{background:rgba(66,153,225,0.2)!important;color:#3182ce!important;border-color:#3182ce!important;box-shadow:0 0 10px rgba(66,153,225,0.3);}
.dark-theme button.selected{background:rgba(88,166,255,0.18)!important;color:#58a6ff!important;border-color:#58a6ff!important;}
.toggle-btn.active{background:rgba(72,187,120,0.2)!important;color:#38a169!important;border-color:#38a169!important;}
#top-bar{width:100%;max-width:1600px;padding:10px 20px 6px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
#map-title{font-size:22px;font-weight:900;letter-spacing:1px;text-transform:uppercase;background:linear-gradient(90deg,#3b82f6,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#save-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
#game-layout-container{display:flex;gap:14px;align-items:flex-start;max-width:1600px;width:100%;padding:0 10px 10px;}
#main-stage{display:flex;flex-direction:column;gap:10px;flex-grow:1;}
#side-deck{width:300px;display:flex;flex-direction:column;gap:8px;padding:14px 12px;border-radius:16px;flex-shrink:0;overflow-y:auto;max-height:820px;}
#ui-panel{display:flex;justify-content:space-around;align-items:center;padding:12px 20px;border-radius:14px;gap:10px;flex-wrap:wrap;}
.stat-block{display:flex;align-items:center;gap:5px;font-size:15px;font-weight:700;}
.stat-val{font-size:21px;font-weight:900;}
#hp-val{color:#f56565!important;}
#gold-val{color:#48bb78!important;}
#wave-val{color:#ed8936!important;}
#score-val{color:#a855f7!important;}
#controls-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
#canvas-wrapper{position:relative;width:100%;border-radius:16px;overflow:hidden;box-shadow:0 20px 45px rgba(0,0,0,0.4);}
canvas{display:block;background:#e2e8f0;width:100%;height:auto;}
.dark-theme canvas{border-color:#2a3240;}
.sidebar-section-title{font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;border-bottom:2px solid rgba(128,128,128,0.2);padding-bottom:5px;opacity:0.8;}
#shop-list{display:flex;flex-direction:column;gap:5px;}
.shop-btn{display:flex;flex-direction:column;gap:2px;text-align:left;padding:7px 9px;border-radius:8px;width:100%;}
.tower-name-row{font-size:13px;font-weight:800;display:flex;justify-content:space-between;}
.tower-cost{font-size:12px;font-weight:700;}
.tower-cost.affordable{color:#48bb78;}
.tower-cost.expensive{color:#f56565;}
.tower-desc{font-size:10px;font-weight:normal;opacity:0.7;line-height:1.3;}
.tower-stats-mini{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;margin-top:3px;font-size:10px;}
.tsm-cell{display:flex;justify-content:space-between;padding:1px 3px;border-radius:3px;background:rgba(0,0,0,0.06);}
.dark-theme .tsm-cell{background:rgba(255,255,255,0.06);}
.tsm-lbl{opacity:0.6;font-weight:normal;}
#floating-config-panel{position:absolute;display:none;flex-direction:column;gap:5px;padding:10px;width:220px;border-radius:12px;z-index:50;background:rgba(255,255,255,0.95);border:1px solid #cbd5e0;box-shadow:0 8px 24px rgba(0,0,0,0.2);backdrop-filter:blur(10px);}
.dark-theme #floating-config-panel{background:rgba(16,22,32,0.97);border-color:#2a3240;box-shadow:0 8px 24px rgba(0,0,0,0.6);}
#tower-config-title{font-size:12px;font-weight:900;text-transform:uppercase;border-bottom:1px solid rgba(128,128,128,0.2);padding-bottom:4px;margin-bottom:2px;}
#selected-stats-live{font-size:11px;display:flex;flex-direction:column;gap:2px;line-height:1.3;}
#priority-select{padding:4px;border-radius:5px;font-weight:700;font-size:11px;width:100%;margin-top:2px;}
#btn-sell{background:rgba(245,101,101,0.12);color:#e53e3e;border:1px solid rgba(245,101,101,0.35);padding:5px 8px;font-size:11px;text-align:center;border-radius:6px;width:100%;margin-top:3px;}
#btn-sell:hover{background:#e53e3e;color:#fff;transform:none;}
#upgrade-panel{display:flex;flex-direction:column;gap:4px;margin-top:4px;padding-top:4px;border-top:1px solid rgba(128,128,128,0.2);}
.upgrade-track{display:flex;gap:3px;flex-direction:column;}
.upgrade-track-label{font-size:10px;font-weight:700;opacity:0.8;margin-bottom:1px;}
.upgrade-dots{display:flex;gap:3px;}
.upgrade-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(128,128,128,0.3);cursor:pointer;transition:all 0.2s;}
.upgrade-dot.unlocked{border-color:#48bb78;background:#48bb78;}
.upgrade-dot.next{border-color:#ed8936;cursor:pointer;animation:pulse-dot 1.2s infinite;}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(237,137,54,0.5);}50%{box-shadow:0 0 0 4px rgba(237,137,54,0);}}
.upgrade-dot.locked{border-color:rgba(128,128,128,0.2);cursor:not-allowed;}
.upgrade-btn{font-size:11px;padding:4px 6px;border-radius:5px;background:rgba(237,137,54,0.15);color:#ed8936;border:1px solid rgba(237,137,54,0.4);text-align:center;}
.upgrade-btn:hover:not(:disabled){background:#ed8936;color:#fff;}
.upgrade-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important;}
#game-over-layer,#victory-layer{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(5,8,14,0.96);backdrop-filter:blur(14px);display:none;flex-direction:column;justify-content:center;align-items:center;z-index:100;border-radius:16px;}
#game-over-layer{border:3px solid #f56565;}
#victory-layer{border:3px solid #48bb78;}
.go-title{font-size:64px;font-weight:900;color:#f56565;margin-bottom:12px;text-transform:uppercase;letter-spacing:3px;text-shadow:0 0 30px rgba(245,101,101,0.5);}
.vict-title{font-size:64px;font-weight:900;color:#48bb78;margin-bottom:12px;text-transform:uppercase;letter-spacing:3px;text-shadow:0 0 30px rgba(72,187,120,0.5);}
.go-stats{font-size:18px;color:#c8d0dc;margin-bottom:28px;text-align:center;line-height:2;}
#btn-restart{background:#f56565;color:#fff;border:1px solid #c53030;padding:14px 36px;font-size:18px;font-weight:900;text-transform:uppercase;border-radius:10px;}
#btn-next-map{background:#48bb78;color:#fff;border:1px solid #276749;padding:14px 36px;font-size:18px;font-weight:900;text-transform:uppercase;border-radius:10px;margin-right:12px;}
/* Audio panel */
#audio-dropdown{position:relative;display:inline-block;}
#audio-panel-btn{font-size:13px;}
#audio-panel-content{display:none;position:absolute;right:0;top:36px;background:#1a2030;border:1px solid #2a3240;border-radius:10px;padding:12px;min-width:190px;z-index:200;box-shadow:0 10px 25px rgba(0,0,0,0.5);}
.light-theme #audio-panel-content{background:#fff;border-color:#cbd5e0;box-shadow:0 10px 25px rgba(0,0,0,0.15);}
#audio-panel-content label{font-size:11px;font-weight:700;opacity:0.8;display:block;margin-bottom:3px;margin-top:8px;}
#audio-panel-content label:first-child{margin-top:0;}
#audio-panel-content input[type=range]{width:100%;accent-color:#3b82f6;}
/* Save slots */
#save-slots-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#0d1520;border:2px solid #2a3240;border-radius:16px;padding:20px;z-index:300;width:480px;display:none;box-shadow:0 20px 50px rgba(0,0,0,0.8);}
.light-theme-save{background:#fff!important;border-color:#cbd5e0!important;}
#save-slots-panel h2{font-size:18px;font-weight:900;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;text-align:center;}
.save-slot{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:1px solid #2a3240;margin-bottom:6px;cursor:pointer;transition:all 0.15s;}
.save-slot:hover{border-color:#3b82f6;background:rgba(59,130,246,0.1);}
.save-slot-name{font-size:13px;font-weight:700;flex:1;}
.save-slot-info{font-size:11px;opacity:0.6;}
.save-slot-btns{display:flex;gap:5px;}
.save-slot-btns button{padding:4px 8px;font-size:11px;border-radius:5px;}
.save-slot.empty{opacity:0.5;border-style:dashed;}
#save-slots-close{position:absolute;top:10px;right:12px;background:none;border:none;font-size:18px;cursor:pointer;opacity:0.6;color:inherit;}
#save-slots-close:hover{opacity:1;transform:none;}
/* Placement preview */
.cursor-tower-preview{pointer-events:none;}
/* Wave incoming banner */
#wave-banner{position:absolute;top:0;left:0;width:100%;pointer-events:none;z-index:40;}
/* Upgrade Notification popup */
.upgrade-notif{position:absolute;font-size:12px;font-weight:800;background:#ed8936;color:#fff;padding:3px 7px;border-radius:6px;pointer-events:none;white-space:nowrap;}
/* Progress bar to next map */
#map-progress-bar{height:6px;border-radius:3px;margin-top:4px;overflow:hidden;background:rgba(128,128,128,0.15);}
#map-progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#3b82f6,#a855f7);transition:width 0.4s;}
/* Tooltip on shop item */
.shop-btn:hover::after{content:attr(data-tip);position:absolute;left:calc(100% + 8px);top:50%;transform:translateY(-50%);background:#0d1520;color:#e8edf2;border:1px solid #2a3240;border-radius:8px;padding:6px 10px;font-size:11px;white-space:pre-wrap;width:180px;z-index:200;pointer-events:none;}
.shop-btn{position:relative;}
#wave-ready-indicator{font-size:11px;font-weight:700;padding:4px 8px;border-radius:6px;background:rgba(72,187,120,0.15);color:#48bb78;border:1px solid rgba(72,187,120,0.3);display:none;}
</style>
</head>
<body class="dark-theme">

<div id="top-bar">
  <div id="map-title">Zombie Tower Defense</div>
  <div id="save-row">
    <button id="btn-saves">💾 Saves</button>
    <div id="audio-dropdown">
      <button id="audio-panel-btn">🔊 Audio</button>
      <div id="audio-panel-content">
        <label>🎵 Music Volume</label>
        <input type="range" id="bgm-vol" min="0" max="100" value="25">
        <label>💥 SFX Volume</label>
        <input type="range" id="sfx-vol" min="0" max="100" value="55">
        <label>
          <input type="checkbox" id="audio-mute"> Mute All
        </label>
      </div>
    </div>
    <select id="theme-select">
      <option value="dark">Dark Mode</option>
      <option value="light">Light Mode</option>
    </select>
    <select id="graphics-select">
      <option value="low">Low Graphics</option>
      <option value="medium">Medium</option>
      <option value="high">High</option>
      <option value="ultra" selected>Ultra</option>
    </select>
  </div>
</div>

<div id="game-layout-container">
  <div id="main-stage">
    <div id="ui-panel" class="glass-panel">
      <div class="stat-block">❤️ <span id="hp-val" class="stat-val">20</span></div>
      <div class="stat-block">💰 <span id="gold-val" class="stat-val">150</span></div>
      <div class="stat-block">🌊 <span id="wave-val" class="stat-val">0</span></div>
      <div class="stat-block">⭐ <span id="score-val" class="stat-val">0</span></div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <button id="btn-wave">▶ Start Wave</button>
        <button id="btn-auto" class="toggle-btn">Auto: OFF</button>
        <span id="wave-ready-indicator">✅ Wave Ready</span>
      </div>
      <div style="display:flex;gap:8px;">
        <button id="btn-speed" class="toggle-btn">1x Speed</button>
        <button id="btn-deselect">✕ Deselect</button>
      </div>
    </div>
    <div id="canvas-wrapper">
      <canvas id="gameCanvas" width="1200" height="750"></canvas>
      <div id="floating-config-panel">
        <div id="tower-config-title">-</div>
        <div id="selected-stats-live"></div>
        <label style="font-size:11px;font-weight:700;margin-top:3px;">Priority:</label>
        <select id="priority-select">
          <option value="first">First</option>
          <option value="closest">Closest</option>
          <option value="last">Last</option>
          <option value="strongest">Strongest</option>
          <option value="weakest">Weakest</option>
        </select>
        <div id="upgrade-panel"></div>
        <button id="btn-sell">Sell (+$<span id="sell-val">0</span>)</button>
      </div>
      <div id="game-over-layer">
        <h1 class="go-title">Game Over</h1>
        <div class="go-stats" id="go-stats-render"></div>
        <div style="display:flex;gap:10px;">
          <button id="btn-restart" style="font-size:16px;padding:12px 28px;">Restart</button>
        </div>
      </div>
      <div id="victory-layer">
        <h1 class="vict-title">Victory!</h1>
        <div class="go-stats" id="vict-stats-render"></div>
        <div style="display:flex;gap:10px;">
          <button id="btn-next-map">Next Map ▶</button>
          <button id="btn-restart-vict" style="font-size:16px;padding:12px 28px;background:#555;color:#fff;border:none;">Main Menu</button>
        </div>
      </div>
    </div>
    <div id="controls-row">
      <div id="map-progress-bar" style="flex:1;min-width:120px;">
        <div id="map-progress-fill" style="width:0%"></div>
      </div>
      <span id="map-progress-label" style="font-size:11px;opacity:0.6;white-space:nowrap;"></span>
    </div>
  </div>

  <div id="side-deck" class="glass-panel">
    <div class="sidebar-section-title">🏗️ Towers</div>
    <div id="shop-list"></div>
  </div>
</div>

<!-- Save Slots Panel -->
<div id="save-slots-panel">
  <button id="save-slots-close">✕</button>
  <h2>💾 Save Slots</h2>
  <div id="save-slots-list"></div>
  <div style="margin-top:10px;display:flex;gap:8px;justify-content:center;">
    <button id="btn-save-current" style="background:#3b82f6;color:#fff;border:none;padding:8px 18px;border-radius:8px;">Save Current</button>
    <button id="btn-new-game-slot" style="background:#48bb78;color:#fff;border:none;padding:8px 18px;border-radius:8px;">New Game</button>
  </div>
</div>

<script>
// ============================================================
// CONSTANTS & CONFIG
// ============================================================
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Game State
let playerHp = 20, gold = 150, wave = 0, score = 0;
let waveActive = false, waveInProgress = false;
let selectedTowerType = null, selectedTowerObj = null;
let gameSpeed = 1, autoWave = false;
let currentMapIndex = 0, currentTheme = "dark";
let graphicsPreset = "ultra", gameIsOver = false, gameIsVictory = false;
let mouseX = 0, mouseY = 0, isMouseOnCanvas = false;
let bannerText = "", bannerTimer = 0, internalTicker = 0;
let waveSpawnQueue = [], spawnCooldown = 0, baseSpawnDelay = 35, autoStartTimer = 0;
let placementBlocked = false;

// Arrays
const towers = [], enemies = [], projectiles = [], particles = [];
const floatingTexts = [], muzzleFlashes = [], lightningVisuals = [];
const environmentDecorations = [], grassTufts = [], pebbles = [];

// Audio
let audioCtx = null, bgmGainNode = null, sfxGainNode = null, bgmOscillators = [];
let bgmVolume = 0.25, sfxVolume = 0.55, audioMuted = false, audioInitialized = false;

// ============================================================
// MAPS (10 total)
// ============================================================
const MAPS = [
  { name:"Level 1: Grassy Plains", bg:"#6cb043", roadColor:"#e6cba4", decorColor:"#2f6920", decorType:"tree",
    targetWaves:10, startGold:150, startHp:20,
    path:[{x:-30,y:220},{x:450,y:220},{x:450,y:550},{x:900,y:550},{x:900,y:300},{x:1230,y:300}]
  },
  { name:"Level 2: Verdant Valley", bg:"#529e37", roadColor:"#caa273", decorColor:"#1d5212", decorType:"tree",
    targetWaves:15, startGold:150, startHp:20,
    path:[{x:220,y:-30},{x:220,y:600},{x:680,y:600},{x:680,y:150},{x:1050,y:150},{x:1050,y:780}]
  },
  { name:"Level 3: Ancient Forest", bg:"#3a7a24", roadColor:"#b88c5c", decorColor:"#0d3206", decorType:"pine",
    targetWaves:20, startGold:175, startHp:20,
    path:[{x:-30,y:380},{x:300,y:380},{x:300,y:120},{x:900,y:120},{x:900,y:630},{x:1230,y:630}]
  },
  { name:"Level 4: Desert Dunes", bg:"#e8c96a", roadColor:"#dfad5b", decorColor:"#b87d33", decorType:"shrub",
    targetWaves:25, startGold:175, startHp:18,
    path:[{x:600,y:-30},{x:600,y:300},{x:150,y:300},{x:150,y:600},{x:1050,y:600},{x:1050,y:780}]
  },
  { name:"Level 5: Volcanic Ash", bg:"#3a2218", roadColor:"#7a4f30", decorColor:"#8b2500", decorType:"rock",
    targetWaves:30, startGold:200, startHp:15,
    path:[{x:-30,y:150},{x:980,y:150},{x:980,y:600},{x:220,y:600},{x:220,y:380},{x:1230,y:380}]
  },
  { name:"Level 6: Frozen Tundra", bg:"#b8d4e8", roadColor:"#d0e8f4", decorColor:"#607ea0", decorType:"pine",
    targetWaves:35, startGold:200, startHp:15,
    path:[{x:-30,y:375},{x:250,y:375},{x:250,y:100},{x:600,y:100},{x:600,y:650},{x:950,y:650},{x:950,y:250},{x:1230,y:250}]
  },
  { name:"Level 7: Haunted Swamp", bg:"#2d4a2a", roadColor:"#8a9a60", decorColor:"#1a3018", decorType:"tree",
    targetWaves:40, startGold:225, startHp:12,
    path:[{x:100,y:-30},{x:100,y:200},{x:700,y:200},{x:700,y:500},{x:300,y:500},{x:300,y:700},{x:1000,y:700},{x:1000,y:100},{x:1230,y:100}]
  },
  { name:"Level 8: Sky Citadel", bg:"#1a1a3e", roadColor:"#3a3a6a", decorColor:"#2a2a5a", decorType:"shrub",
    targetWaves:45, startGold:250, startHp:10,
    path:[{x:-30,y:600},{x:400,y:600},{x:400,y:400},{x:800,y:400},{x:800,y:200},{x:200,y:200},{x:200,y:50},{x:1230,y:50}]
  },
  { name:"Level 9: Infernal Depths", bg:"#1a0800", roadColor:"#5a2200", decorColor:"#7a1500", decorType:"rock",
    targetWaves:50, startGold:250, startHp:8,
    path:[{x:-30,y:375},{x:150,y:375},{x:150,y:100},{x:500,y:100},{x:500,y:650},{x:850,y:650},{x:850,y:200},{x:1100,y:200},{x:1100,y:500},{x:1230,y:500}]
  },
  { name:"Level 10: Final Stand (Endless)", bg:"#0a1a0a", roadColor:"#1a3a1a", decorColor:"#0d2a0d", decorType:"pine",
    targetWaves:Infinity, startGold:300, startHp:5,
    path:[{x:-30,y:200},{x:300,y:200},{x:300,y:550},{x:600,y:550},{x:600,y:100},{x:900,y:100},{x:900,y:650},{x:1230,y:650}]
  }
];

// ============================================================
// TOWER TYPES (18 total)
// ============================================================
const TOWER_TYPES = {
  cannon:  { name:"Cannon",    emoji:"🟢", cost:100,  range:180, fireRate:48,  damage:18,  color:"#a855f7", barrelLen:30, barrelW:12, muzzleColor:"#ff9900", desc:"Reliable all-rounder. Good damage and range.",
             upgrades:[
               [{name:"Heavy Shot",desc:"Damage +50%",fn:t=>{t.dmgMult=(t.dmgMult||1)*1.5;},cost:80},
                {name:"Long Barrel",desc:"Range +20%",fn:t=>{t.rangeMult=(t.rangeMult||1)*1.2;},cost:80},
                {name:"Double Fire",desc:"Fire rate +30%",fn:t=>{t.rateMult=(t.rateMult||1)*0.7;},cost:120},
                {name:"Explosive",desc:"AoE splash 60px",fn:t=>{t.splash=60;},cost:200}],
               [{name:"Armor Pierce",desc:"Ignore 5 armor",fn:t=>{t.armorPierce=(t.armorPierce||0)+5;},cost:150},
                {name:"Rapid Reload",desc:"Fire rate +50%",fn:t=>{t.rateMult=(t.rateMult||1)*0.5;},cost:150},
                {name:"Mega Shot",desc:"Damage +100%",fn:t=>{t.dmgMult=(t.dmgMult||1)*2;},cost:250},
                {name:"Hellfire",desc:"Burn 3 dmg/s",fn:t=>{t.burn=3;},cost:300}]
             ]},

// SAVE SYSTEM
// ============================================================
const MAX_SAVES = 10;
function getSaveKey(slot){ return `ztd_save_${slot}`; }
function buildSaveData(){
  return {
    playerHp, gold, wave, score, currentMapIndex,
    towers: towers.map(t=>({x:t.x,y:t.y,type:t.type,angle:t.angle,priority:t.priority,upgrades:t.upgrades||[],dmgMult:t.dmgMult,rangeMult:t.rangeMult,rateMult:t.rateMult})),
    timestamp: Date.now(), wavesCompleted: wave
  };
}
function saveGame(slot){
  try{ localStorage.setItem(getSaveKey(slot), JSON.stringify(buildSaveData())); return true; }
  catch(e){ return false; }
}
function loadGame(slot){
  try{
    let raw = localStorage.getItem(getSaveKey(slot));
    if(!raw) return false;
    let d = JSON.parse(raw);
    playerHp = d.playerHp || 20; gold = d.gold || 150; wave = d.wave || 0;
    score = d.score || 0; currentMapIndex = d.currentMapIndex || 0;
    towers.length = 0;
    (d.towers||[]).forEach(td=>{

// ============================================================
// AUDIO SYSTEM
// ============================================================
function initAudio(){
  if(audioInitialized) return;
  try{
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    bgmGainNode = audioCtx.createGain();
    sfxGainNode = audioCtx.createGain();
    bgmGainNode.gain.value = audioMuted ? 0 : bgmVolume;
    sfxGainNode.gain.value = audioMuted ? 0 : sfxVolume;
    bgmGainNode.connect(audioCtx.destination);
    sfxGainNode.connect(audioCtx.destination);
    startBGM();
    audioInitialized = true;
  }catch(e){}
}
function startBGM(){
  if(!audioCtx) return;
  // Simple ambient loop using oscillators
  const notes = [55, 65.41, 73.42, 82.41, 87.31, 98];
  let idx = 0;
  function playNext(){
    if(!bgmGainNode) return;
    let osc = audioCtx.createOscillator();
    let g = audioCtx.createGain();
    osc.connect(g); g.connect(bgmGainNode);
    osc.type = 'triangle';
    osc.frequency.value = notes[idx % notes.length];
    g.gain.setValueAtTime(0, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 0.1);
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.2);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 1.3);
    idx++;
    setTimeout(playNext, 900 + Math.random()*400);
  }
  playNext();
}
function playSFX(type){
  if(!audioCtx || !sfxGainNode || audioMuted) return;
  try{
    let osc = audioCtx.createOscillator();
    let g = audioCtx.createGain();
    osc.connect(g); g.connect(sfxGainNode);
    let now = audioCtx.currentTime;
    const cfg = {
      cannon: {t:'sawtooth',f0:140,f1:40,d:0.15,v:0.12},
      plasma: {t:'triangle',f0:90,f1:20,d:0.4,v:0.2},
      frost:  {t:'sine',f0:600,f1:300,d:0.12,v:0.07},
      sniper: {t:'square',f0:320,f1:90,d:0.2,v:0.06},
      minigun:{t:'sawtooth',f0:220,f1:200,d:0.05,v:0.04},
      tesla:  {t:'sawtooth',f0:400,f1:800,d:0.15,v:0.08},
      railgun:{t:'sawtooth',f0:300,f1:900,d:0.2,v:0.09},
      laser:  {t:'sine',f0:800,f1:700,d:0.05,v:0.04},
      mortar: {t:'triangle',f0:100,f1:30,d:0.3,v:0.15},
      flamethrower:{t:'sawtooth',f0:180,f1:60,d:0.08,v:0.05},
      poison: {t:'sine',f0:500,f1:200,d:0.12,v:0.05},
      missile:{t:'sawtooth',f0:250,f1:80,d:0.25,v:0.1},
      antiair:{t:'square',f0:400,f1:200,d:0.1,v:0.06},
      shockwave:{t:'triangle',f0:60,f1:20,d:0.5,v:0.2},
      vortex: {t:'sine',f0:300,f1:100,d:0.3,v:0.06},
      barrier:{t:'sine',f0:200,f1:180,d:0.05,v:0.03},
      nuke:   {t:'sawtooth',f0:80,f1:15,d:1.0,v:0.3},
      oracle: {t:'sine',f0:700,f1:900,d:0.2,v:0.04}
    };
    let c = cfg[type] || cfg.cannon;
    osc.type = c.t; osc.frequency.setValueAtTime(c.f0,now);
    osc.frequency.exponentialRampToValueAtTime(c.f1, now+c.d);
    g.gain.setValueAtTime(c.v,now); g.gain.exponentialRampToValueAtTime(0.001,now+c.d);
    osc.start(now); osc.stop(now+c.d);
  }catch(e){}
}

function getCoords(e){
  let r=canvas.getBoundingClientRect();
  return { x:(e.clientX-r.left)*(canvas.width/r.width), y:(e.clientY-r.top)*(canvas.height/r.height) };
}
canvas.addEventListener("mousemove",e=>{ let c=getCoords(e); mouseX=c.x; mouseY=c.y; isMouseOnCanvas=true; });
canvas.addEventListener("mouseleave",()=>{ isMouseOnCanvas=false; });
canvas.addEventListener("click",e=>{
  if(gameIsOver||gameIsVictory) return;
  initAudio();
  let c=getCoords(e);
  // Click tower
  for(let t of towers){
    if(Math.hypot(t.x-c.x,t.y-c.y)<24){
      selectedTowerObj=t; selectedTowerType=null;
      document.querySelectorAll(".shop-btn").forEach(b=>b.classList.remove("selected"));
      updateUI(); return;
    }
  }
  if(selectedTowerType){
    let cfg=TOWER_TYPES[selectedTowerType];
    if(gold<cfg.cost){ createFloatText("Not enough gold!",c.x,c.y-20,"#f56565"); return; }
    if(isOnPath(c.x,c.y,36)){ createFloatText("Can't build on path!",c.x,c.y-20,"#f56565"); return; }
    if(isOnDecoration(c.x,c.y)){ createFloatText("Can't build on tree/rock!",c.x,c.y-20,"#f56565"); return; }
    for(let t of towers){
      if(Math.hypot(t.x-c.x,t.y-c.y)<46){ createFloatText("Too close to another tower!",c.x,c.y-20,"#f56565"); return; }
    }
    towers.push({x:c.x,y:c.y,type:selectedTowerType,angle:0,cooldown:0,priority:"first",upgrades:[],recoil:0,id:Math.random()});
    gold-=cfg.cost; updateUI();
  } else {
    selectedTowerObj=null; updateUI();
  }
});

// ============================================================
// PATH & DECORATION COLLISION
// ============================================================
function isOnPath(px,py,r){
  let pts=MAPS[currentMapIndex].path;
  for(let i=0;i<pts.length-1;i++){
    if(ptSegDist(px,py,pts[i].x,pts[i].y,pts[i+1].x,pts[i+1].y)<(r+24)) return true;
  }
  return false;
}
function isOnDecoration(px,py){
  for(let d of environmentDecorations){
    if(Math.hypot(d.x-px,d.y-py)<d.size+18) return true;
  }
  return false;
}
function ptSegDist(x,y,x1,y1,x2,y2){
  let A=x-x1,B=y-y1,C=x2-x1,D=y2-y1;
  let dot=A*C+B*D,len=C*C+D*D,p=len?dot/len:-1;
  let xx,yy;
  if(p<0){xx=x1;yy=y1;}else if(p>1){xx=x2;yy=y2;}else{xx=x1+p*C;yy=y1+p*D;}
  return Math.hypot(x-xx,y-yy);
}

    let dmg=Math.round(cfg.damage*(selectedTowerObj.dmgMult||1));
    let rng=Math.round(cfg.range*(selectedTowerObj.rangeMult||1));
    let fr=Math.round(cfg.fireRate*(selectedTowerObj.rateMult||1));
    let frText=fr===1?"Continuous":(fr/60).toFixed(2)+"s";
    panel.style.display="flex";
    // Smart positioning to stay in canvas
    let px=selectedTowerObj.x-105, py=selectedTowerObj.y+30;
    if(px<0) px=4; if(px>990) px=990;
    if(py>550) py=selectedTowerObj.y-200;
    panel.style.left=px+"px"; panel.style.top=py+"px";
    document.getElementById("tower-config-title").innerText=`${cfg.emoji} ${cfg.name}`;
    document.getElementById("selected-stats-live").innerHTML=
      `<div>⚡ Dmg: <b>${dmg}</b></div><div>🎯 Range: <b>${rng}px</b></div><div>⏱️ Rate: <b>${frText}</b></div>`;
    document.getElementById("priority-select").value=selectedTowerObj.priority;
    let sellVal=Math.floor(cfg.cost*0.6);
    (selectedTowerObj.upgrades||[]).forEach(u=>sellVal+=Math.floor(u.cost*0.3));
    document.getElementById("sell-val").innerText=sellVal;
    renderUpgradePanel(selectedTowerObj);

  }

function renderUpgradePanel(t){
  let cfg=TOWER_TYPES[t.type];
  let panel=document.getElementById("upgrade-panel");
  panel.innerHTML="";
  if(!cfg.upgrades) return;
  cfg.upgrades.forEach((track,trackIdx)=>{
    let completed=(t.upgrades||[]).filter(u=>u.track===trackIdx).length;
    let div=document.createElement("div"); div.className="upgrade-track";
    let label=document.createElement("div"); label.className="upgrade-track-label";
    label.innerText=`Path ${trackIdx+1} (${completed}/4)`;
    div.appendChild(label);
    let dots=document.createElement("div"); dots.className="upgrade-dots";
    for(let i=0;i<4;i++){
      let dot=document.createElement("div"); dot.className="upgrade-dot";
      if(i<completed) dot.classList.add("unlocked");
      else if(i===completed) dot.classList.add("next");
      else dot.classList.add("locked");
      dots.appendChild(dot);
    }
    div.appendChild(dots);
    if(completed<4){
      let nextUpg=track[completed];
      let btn=document.createElement("button");
      btn.className="upgrade-btn";
      btn.disabled=gold<nextUpg.cost;
      btn.innerText=`${nextUpg.name}: ${nextUpg.desc} ($${nextUpg.cost})`;
      btn.addEventListener("click",()=>{
        if(gold<nextUpg.cost) return;
        gold-=nextUpg.cost;
        nextUpg.fn(t);
        if(!t.upgrades) t.upgrades=[];
        t.upgrades.push({track:trackIdx,cost:nextUpg.cost,name:nextUpg.name});
        createFloatText(`↑ ${nextUpg.name}!`,t.x,t.y-30,"#ed8936");
        updateUI();
      });
      div.appendChild(btn);
    } else {
      let done=document.createElement("div");
      done.style.cssText="font-size:10px;color:#48bb78;font-weight:700;";
      done.innerText="✅ Fully Upgraded!"; div.appendChild(done);
    }
    panel.appendChild(div);
  });
}

// ============================================================
// DECORATIONS
// ============================================================
function generateDecorations(){
  environmentDecorations.length=0; grassTufts.length=0; pebbles.length=0;
  let m=MAPS[currentMapIndex];
  for(let i=0;i<60;i++){
    let px=Math.random()*canvas.width, py=Math.random()*canvas.height;
    if(!isOnPath(px,py,22)) pebbles.push({x:px,y:py,size:Math.random()*2.5+0.8});
  }
  if(m.decorType!=="rock"){
    for(let gx=30;gx<canvas.width;gx+=55){
      for(let gy=30;gy<canvas.height;gy+=55){
        let rx=gx+(Math.random()*28-14), ry=gy+(Math.random()*28-14);
        if(!isOnPath(rx,ry,32)){
          let blades=[];
          for(let b=0;b<4+Math.floor(Math.random()*3);b++)
            blades.push({dx:Math.random()*12-6,dy:-(Math.random()*10+6),curve:Math.random()*8-4});
          grassTufts.push({x:rx,y:ry,blades});
        }
      }
    }
  }
  for(let i=0;i<70;i++){
    for(let a=0;a<150;a++){
      let rx=Math.random()*(canvas.width-80)+40, ry=Math.random()*(canvas.height-80)+40;
      if(!isOnPath(rx,ry,70)&&!towers.some(t=>Math.hypot(t.x-rx,t.y-ry)<50)){
        environmentDecorations.push({x:rx,y:ry,size:Math.random()*14+16,color:m.decorColor,type:m.decorType,seed:Math.random()*100});
        break;
      }
    }
  }
}

function triggerNextWave(){
  if(waveInProgress) return;
  wave++; waveInProgress=true; waveActive=true;
  updateUI(); showBanner(`WAVE ${wave} INCOMING!`);
  let baseCount=5+wave*3;
  let hpScale=Math.pow(1.22,wave-1);
  baseSpawnDelay=Math.max(8,48-wave*1.5);
  spawnCooldown=0; waveSpawnQueue=[];
  for(let i=0;i<baseCount;i++){
    let r=Math.random()*100;
    let zType=ZOMBIE_TYPES[0];
    if(wave>=2&&r>65) zType=ZOMBIE_TYPES[1];
    if(wave>=5&&r>80) zType=ZOMBIE_TYPES[2];
    if(wave>=8&&r>90) zType=ZOMBIE_TYPES[3];
    if(wave>=12&&r>88) zType=ZOMBIE_TYPES[4];
    if(wave>=15&&r>85) zType=ZOMBIE_TYPES[5];
    if(wave>=10&&r>92) zType=ZOMBIE_TYPES[6];
    if(wave>=20&&r>96) zType=ZOMBIE_TYPES[7];
    waveSpawnQueue.push({typeData:zType,hp:Math.floor(22*zType.hpMult*hpScale)});
  }
}

  gameIsOver=false; gameIsVictory=false; selectedTowerObj=null;
  document.getElementById("game-over-layer").style.display="none";
  document.getElementById("victory-layer").style.display="none";
  generateDecorations(); buildShop(); updateUI();
}

// ============================================================
// HELPERS
// ============================================================
function showBanner(txt){ bannerText=txt; bannerTimer=100; }
function createFloatText(txt,x,y,color="#ffffff"){ floatingTexts.push({text:txt,x,y,color,life:50}); }
function createParticles(x,y,color,n=14,scl=1){
  for(let i=0;i<n;i++){
    let a=Math.random()*Math.PI*2, s=(Math.random()*4+1)*scl;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,size:(Math.random()*4+1.5)*scl,color,life:Math.random()*22+14});
  }
}
function createMuzzle(x,y,ang,type){
  let cfg=TOWER_TYPES[type];
  muzzleFlashes.push({x,y,angle:ang,size:cfg.barrelW*2.4,color:cfg.muzzleColor||"#ffaa00",life:5,maxLife:5});
}

// Oracle aura multiplier
function getOracleMultiplier(tx,ty){
  let mult=1;
  towers.forEach(o=>{
    if(TOWER_TYPES[o.type].isOracle){
      let rng=(TOWER_TYPES.oracle.range*(o.rangeMult||1));
      if(o.globalAura||Math.hypot(o.x-tx,o.y-ty)<=rng){
        let m=o.auraMult||1.25;
        if(o.godEye) m*=2;
        mult*=m;
      }
    }
  });
  return mult;
}
function getOracleRateMultiplier(tx,ty){
  let mult=1;
  towers.forEach(o=>{
    if(TOWER_TYPES[o.type].isOracle&&o.auraRate){
      let rng=(TOWER_TYPES.oracle.range*(o.rangeMult||1));
      if(o.globalAura||Math.hypot(o.x-tx,o.y-ty)<=rng) mult*=0.8;
    }
  });
  return mult;
}

// ============================================================
// MAIN LOGIC UPDATE
// ============================================================
function updateLogic(){
  if(bannerTimer>0) bannerTimer--;
  internalTicker++;

  // Spawn enemies
  if(waveInProgress&&waveSpawnQueue.length>0){
    spawnCooldown--;
    if(spawnCooldown<=0){
      spawnCooldown=baseSpawnDelay;
      let nz=waveSpawnQueue.shift();
      let sp=MAPS[currentMapIndex].path[0];
      enemies.push({
        x:sp.x,y:sp.y,hp:nz.hp,maxHp:nz.hp,
        speed:nz.typeData.speed, color:nz.typeData.color, reward:nz.typeData.reward,
        size:nz.typeData.size, type:nz.typeData.type, phase:nz.typeData.phase||false,
        armor:nz.typeData.armor||0,
        pathIdx:0, dist:0, slowTimer:0, slowMult:1,
        burnTimer:0, burnDmg:0, poisonTimer:0, poisonDmg:0,
        stunTimer:0, id:Math.random()
      });
    }
  }

  // Move enemies
  let pts=MAPS[currentMapIndex].path;
  for(let i=enemies.length-1;i>=0;i--){
    let e=enemies[i];
    // DoTs
    if(e.stunTimer>0){ e.stunTimer--; continue; }
    if(e.slowTimer>0){ e.slowTimer--; e.slowMult=e._slowPow||0.5; }
    else e.slowMult=1;
    if(e.burnTimer>0){ e.burnTimer--; e.hp-=e.burnDmg/60; }
    if(e.poisonTimer>0){ e.poisonTimer--; e.hp-=e.poisonDmg/60; }
    if(e.hp<=0){ killEnemy(i,e); continue; }
    let spd=e.speed*e.slowMult;
    let tgt=pts[e.pathIdx+1];
    if(!tgt){ playerHp--; createFloatText("-1 Life",e.x,e.y,"#f56565"); enemies.splice(i,1); updateUI(); checkGameOver(); continue; }
    let dx=tgt.x-e.x, dy=tgt.y-e.y, d=Math.hypot(dx,dy);
    if(d<=spd){ e.x=tgt.x; e.y=tgt.y; e.pathIdx++; }
    else { e.x+=dx/d*spd; e.y+=dy/d*spd; }
    e.dist+=spd;
  }

  // Barrier tower - slow enemies in range
  towers.forEach(t=>{
    let cfg=TOWER_TYPES[t.type];
    if(!cfg.isBarrier) return;
    let rng=cfg.range*(t.rangeMult||1);
    let slow=t.barrierSlow||0.6;
    enemies.forEach(e=>{
      if(Math.hypot(e.x-t.x,e.y-t.y)<=rng){
        e.slowTimer=5; e._slowPow=slow;
        if(t.barrierDmg) e.hp-=t.barrierDmg/60;
        if(t.barrierKill) e.hp=0;
        if(t.timeStop) e.stunTimer=5;
        if(t.barrierStun&&internalTicker%t.barrierStun===0) e.stunTimer=60;
      }
    });
  });

  // Vortex tower
  towers.forEach(t=>{
    let cfg=TOWER_TYPES[t.type];
    if(!cfg.isVortex) return;
    let rng=cfg.range*(t.rangeMult||1);
    let pull=(t.pullForce||1)*0.8;
    enemies.forEach(e=>{
      let dx=t.x-e.x, dy=t.y-e.y, d=Math.hypot(dx,dy);
      if(d<=rng&&d>1){
        e.x+=dx/d*pull; e.y+=dy/d*pull;
        if(t.vortexSlow){ e.slowTimer=5; e._slowPow=t.slowPower||0.5; }
        if(t.vortexKill) e.hp=0;
      }
    });
  });

  // Towers fire
  towers.forEach(t=>{
    let cfg=TOWER_TYPES[t.type];
    if(cfg.isBarrier||cfg.isVortex||cfg.isOracle) return;
    if(t.cooldown>0) t.cooldown--;
    if(t.recoil>0) t.recoil-=0.3;
    let rng=cfg.range*(t.rangeMult||1);
    let oracleMult=getOracleMultiplier(t.x,t.y);
    let oracleRate=getOracleRateMultiplier(t.x,t.y);
    let minDist=cfg.isMortar?100:0;
    let validTargets=enemies.filter(e=>{ let d=Math.hypot(e.x-t.x,e.y-t.y); return d<=rng&&d>=minDist; });
    if(validTargets.length===0) return;
    if(t.priority==="first") validTargets.sort((a,b)=>b.dist-a.dist);
    else if(t.priority==="last") validTargets.sort((a,b)=>a.dist-b.dist);
    else if(t.priority==="closest") validTargets.sort((a,b)=>Math.hypot(a.x-t.x,a.y-t.y)-Math.hypot(b.x-t.x,b.y-t.y));
    else if(t.priority==="strongest") validTargets.sort((a,b)=>b.hp-a.hp);
    else if(t.priority==="weakest") validTargets.sort((a,b)=>a.hp-b.hp);
    let target=validTargets[0];
    t.angle=Math.atan2(target.y-t.y,target.x-t.x);
    let effectiveFR=Math.round((cfg.fireRate*(t.rateMult||1))*oracleRate);

    // Laser continuous
    if(cfg.isLaser){
      let dmg=(cfg.damage*(t.dmgMult||1))*oracleMult;
      target.hp-=dmg;
      if(t.laserBounce){ // bounce
        let prev=target;
        for(let b=0;b<(t.laserBounce||0);b++){
          let close=enemies.filter(e=>e!==prev&&Math.hypot(e.x-prev.x,e.y-prev.y)<120);
          if(close.length===0) break;
          close.sort((a,b2)=>Math.hypot(a.x-prev.x,a.y-prev.y)-Math.hypot(b2.x-prev.x,b2.y-prev.y));
          close[0].hp-=dmg*0.7;
          prev=close[0];
        }
      }
      if(t.burn) { target.burnTimer=120; target.burnDmg=t.burn; }
      if(t.armorShred) target.armor=Math.max(0,(target.armor||0)-t.armorShred);
      if(internalTicker%15===0) playSFX("laser");
      if(target.hp<=0) killEnemy(enemies.indexOf(target),target);
      return;
    }
    // Flame continuous
    if(cfg.isFlame){
      validTargets.slice(0,t.flameCone?5:1).forEach(e=>{
        let dmg=(cfg.damage*(t.dmgMult||1))*oracleMult;
        e.hp-=dmg;
        if(t.burn) { e.burnTimer=180; e.burnDmg=t.burn; }
        if(e.hp<=0) killEnemy(enemies.indexOf(e),e);
      });
      if(internalTicker%8===0) playSFX("flamethrower");
      if(graphicsPreset!=="low"){
        let bx=t.x+Math.cos(t.angle)*cfg.barrelLen, by=t.y+Math.sin(t.angle)*cfg.barrelLen;
        particles.push({x:bx,y:by,vx:Math.cos(t.angle)*3+Math.random()*2-1,vy:Math.sin(t.angle)*3+Math.random()*2-1,size:Math.random()*12+6,color:`hsl(${Math.random()*30+10},100%,55%)`,life:12});
      }
      return;
    }
    // Poison
    if(cfg.isPoison){
      if(t.cooldown>0) return;
      t.cooldown=effectiveFR; t.recoil=6;
      let rng2=cfg.range*(t.rangeMult||1);
      let targets=t.poisonAoE?enemies.filter(e=>Math.hypot(e.x-t.x,e.y-t.y)<=rng2):[target];
      targets.forEach(e=>{
        let dmg=Math.max(0,(cfg.damage*(t.dmgMult||1))-e.armor)*oracleMult;
        e.hp-=dmg;
        let pdmg=6*(t.poisonMult||1); e.poisonTimer=300; e.poisonDmg=pdmg;
        if(t.infectSpread){ enemies.forEach(ne=>{ if(Math.hypot(ne.x-e.x,ne.y-e.y)<=t.infectSpread){ ne.poisonTimer=240; ne.poisonDmg=pdmg*0.5; } }); }
        if(t.globalPoison) enemies.forEach(ne=>{ ne.poisonTimer=240; ne.poisonDmg=pdmg; });
        if(e.hp<=0) killEnemy(enemies.indexOf(e),e);
      });
      createMuzzle(t.x+Math.cos(t.angle)*cfg.barrelLen,t.y+Math.sin(t.angle)*cfg.barrelLen,t.angle,"poison");
      playSFX("poison");
      return;
    }
    if(t.cooldown>0) return;
    t.cooldown=effectiveFR; t.recoil=8;
    let bx=t.x+Math.cos(t.angle)*cfg.barrelLen, by=t.y+Math.sin(t.angle)*cfg.barrelLen;
    createMuzzle(bx,by,t.angle,t.type);
    playSFX(t.type);
    let dmgBase=(cfg.damage*(t.dmgMult||1))*oracleMult;
    if(cfg.isTesla){
      fireTesla(t,target,dmgBase);
    } else if(cfg.isRailgun){
      fireRailgun(t,dmgBase,oracleMult);
    } else if(cfg.isPlasma||cfg.isMortar||cfg.isShockwave||cfg.isNuke){
      let shots=t.multiShot||1;
      for(let s=0;s<shots;s++){
        let tx2=target.x+(s*40*Math.random()), ty2=target.y+(s*40*Math.random());
        projectiles.push({x:bx,y:by,tx:tx2,ty:ty2,target:target,speed:cfg.isNuke?3:5,damage:dmgBase,type:t.type,
          isAoE:true,splashR:(cfg.splashR||100)*(t.splashMult||1),life:0,
          burn:t.burn,empSlow:t.empSlow,stunDur:t.stunDur});
      }
    } else {
      let shots=t.multiShot||1;
      for(let s=0;s<shots;s++){
        let angOff=s===0?0:(s%2===0?1:-1)*0.12*Math.ceil(s/2);
        let tgtE=validTargets[Math.min(s,validTargets.length-1)]||target;
        projectiles.push({x:bx,y:by,target:tgtE,tx:tgtE.x,ty:tgtE.y,
          speed:t.type==="sniper"?18:t.type==="antiair"?14:9,
          damage:dmgBase,type:t.type,
          isFrost:cfg.isFrost,slowPower:t.slowPower,slowDur:t.slowDuration||75,
          isMissile:cfg.isMissile,splashR:t.splashR||(cfg.isMissile?80:0),
          burn:t.burn,armorPierce:t.armorPierce||0,armorShred:t.armorShred||0,
          headshot:t.headshot,executeThresh:t.executeThresh,deathMark:t.deathMark,
          stunDur:t.stunDur,life:0,angOff});
      }
    }
  });

  // Move projectiles
  for(let i=projectiles.length-1;i>=0;i--){
    let p=projectiles[i]; p.life++;
    let tx=p.tx, ty=p.ty;
    if(enemies.includes(p.target)){ tx=p.target.x; ty=p.target.y; p.tx=tx; p.ty=ty; }
    let dx=tx-p.x, dy=ty-p.y, d=Math.hypot(dx,dy);
    if(d<=p.speed||p.life>400){
      if(p.isAoE){ triggerAoE(p.x,p.y,p.splashR,p.damage,p.type,p.burn,p.empSlow,p.stunDur); }
      else if(enemies.includes(p.target)){
        let e=p.target;
        let dmg=Math.max(0,p.damage-(e.armor-(p.armorPierce||0)));
        if(p.executeThresh&&e.hp/e.maxHp<p.executeThresh) dmg=e.hp+1;
        if(p.headshot&&Math.random()<p.headshot) dmg=e.maxHp;
        e.hp-=dmg;
        if(p.isFrost){ e.slowTimer=p.slowDur||75; e._slowPow=p.slowPower||0.5; }
        if(p.burn){ e.burnTimer=180; e.burnDmg=p.burn; }
        if(p.armorShred) e.armor=Math.max(0,(e.armor||0)-p.armorShred);
        if(p.stunDur) e.stunTimer=p.stunDur;
        if(p.splashR){ // splash on hit
          enemies.forEach(ne=>{ if(ne!==e&&Math.hypot(ne.x-e.x,ne.y-e.y)<=p.splashR){ ne.hp-=dmg*0.5; } });
        }
        createParticles(e.x,e.y,p.isFrost?"#06b6d4":"#a855f7",6);
        if(e.hp<=0) killEnemy(enemies.indexOf(e),e);
      }
      projectiles.splice(i,1);
    } else {
      p.x+=dx/d*p.speed; p.y+=dy/d*p.speed;
    }
  }

  // Particles, texts, flashes
  for(let i=particles.length-1;i>=0;i--){ let p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.05; p.life--; if(p.life<=0) particles.splice(i,1); }
  for(let i=floatingTexts.length-1;i>=0;i--){ let ft=floatingTexts[i]; ft.y-=0.5; ft.life--; if(ft.life<=0) floatingTexts.splice(i,1); }
  for(let i=muzzleFlashes.length-1;i>=0;i--){ muzzleFlashes[i].life--; if(muzzleFlashes[i].life<=0) muzzleFlashes.splice(i,1); }
  for(let i=lightningVisuals.length-1;i>=0;i--){ lightningVisuals[i].life--; if(lightningVisuals[i].life<=0) lightningVisuals.splice(i,1); }

  // Wave complete check
  if(waveInProgress&&enemies.length===0&&waveSpawnQueue.length===0){
    waveInProgress=false;
    let bonus=120+wave*18; gold+=bonus; score+=bonus;
    createFloatText(`Wave ${wave} Complete! +$${bonus}`,canvas.width/2,120,"#48bb78");
    let m=MAPS[currentMapIndex];
    if(wave>=m.targetWaves&&m.targetWaves!==Infinity){
      // Victory!
      if(currentMapIndex>=MAPS.length-1){
        gameIsVictory=true;
        document.getElementById("vict-stats-render").innerHTML=`All Maps Complete!<br>Final Score: <b>${score}</b>`;
        document.getElementById("victory-layer").style.display="flex";
      } else {
        gameIsVictory=true;
        document.getElementById("vict-stats-render").innerHTML=`Map Complete! Wave ${wave}<br>Score: <b>${score}</b>`;
        document.getElementById("victory-layer").style.display="flex";
      }
    } else if(autoWave) { autoStartTimer=50; }
    updateUI();
  }
  if(!waveInProgress&&autoWave&&autoStartTimer>0&&!gameIsOver&&!gameIsVictory){
    autoStartTimer--; if(autoStartTimer<=0) triggerNextWave();
  }
}

function killEnemy(idx,e){
  if(idx<0||idx>=enemies.length) return;
  gold+=e.reward; score+=e.reward*2;
  // Oracle gold aura
  towers.forEach(o=>{ if(TOWER_TYPES[o.type].isOracle&&o.goldAura){ if(o.goldAuraGlobal||Math.hypot(o.x-e.x,o.y-e.y)<=(TOWER_TYPES.oracle.range*(o.rangeMult||1))){ gold+=o.goldAura; score+=o.goldAura; } } });
  createFloatText(`+$${e.reward}`,e.x,e.y-14,"#48bb78");
  createParticles(e.x,e.y,e.color,10);
  enemies.splice(idx,1);
  updateUI();
}

function triggerAoE(x,y,r,dmg,type,burn,empSlow,stunDur){
  createParticles(x,y,type==="nuke"?"#ef4444":"#ff4500",50,3);
  for(let i=enemies.length-1;i>=0;i--){
    let e=enemies[i];
    if(Math.hypot(e.x-x,e.y-y)<=r){
      e.hp-=dmg;
      if(burn){ e.burnTimer=240; e.burnDmg=burn; }
      if(empSlow){ e.slowTimer=180; e._slowPow=0.3; }
      if(stunDur) e.stunTimer=stunDur;
      if(e.hp<=0) killEnemy(i,e);
    }
  }
}

function fireTesla(t,firstTarget,dmg){
  let chainCount=(TOWER_TYPES.tesla.chainCount+(t.chainBonus||0));
  if(t.globalChain) chainCount=enemies.length;
  let chainRange=t.chainRange||110;
  let chainList=[firstTarget], cur=firstTarget;
  while(chainList.length<chainCount){
    let poss=enemies.filter(e=>!chainList.includes(e)&&Math.hypot(e.x-cur.x,e.y-cur.y)<=chainRange);
    if(!poss.length) break;
    poss.sort((a,b)=>Math.hypot(a.x-cur.x,a.y-cur.y)-Math.hypot(b.x-cur.x,b.y-cur.y));
    chainList.push(poss[0]); cur=poss[0];
  }
  let chainStart={x:t.x+Math.cos(t.angle)*TOWER_TYPES.tesla.barrelLen,y:t.y+Math.sin(t.angle)*TOWER_TYPES.tesla.barrelLen};
  chainList.forEach((e,idx)=>{
    e.hp-=dmg*(1-idx*0.08);
    if(t.stunDur) e.stunTimer=t.stunDur;
    if(t.empSlow){ e.slowTimer=180; e._slowPow=0.3; }
    let prev=idx===0?chainStart:chainList[idx-1];
    // Lightning bolt visual - jagged segments
    let segs=[];
    let steps=6, sx=prev.x||prev.x, sy=prev.y||prev.y, ex=e.x, ey=e.y;
    if(idx===0){ sx=chainStart.x; sy=chainStart.y; }
    for(let s=0;s<steps;s++){
      let pct=s/steps, npct=(s+1)/steps;
      let mx=(sx+(ex-sx)*pct), my=(sy+(ey-sy)*pct);
      let mx2=(sx+(ex-sx)*npct), my2=(sy+(ey-sy)*npct);
      let perp=Math.atan2(ey-sy,ex-sx)+Math.PI/2;
      let jitter=(Math.random()-0.5)*30;
      segs.push({x1:mx+Math.cos(perp)*jitter,y1:my+Math.sin(perp)*jitter,x2:mx2,y2:my2});
    }
    lightningVisuals.push({segs,life:8,color:"#c084fc",width:2-idx*0.2});
    if(e.hp<=0) killEnemy(enemies.indexOf(e),e);
  });
  playSFX("tesla");
}

function fireRailgun(t,dmg,oracleMult){
  let rng=TOWER_TYPES.railgun.range*(t.rangeMult||1);
  let rails=t.multiRail||1;
  for(let r=0;r<rails;r++){
    let ang=t.angle+(r-Math.floor(rails/2))*0.1;
    let ex=t.x+Math.cos(ang)*rng, ey=t.y+Math.sin(ang)*rng;
    let bx=t.x+Math.cos(ang)*TOWER_TYPES.railgun.barrelLen, by=t.y+Math.sin(ang)*TOWER_TYPES.railgun.barrelLen;
    lightningVisuals.push({segs:[{x1:bx,y1:by,x2:ex,y2:ey}],life:10,color:"#93c5fd",width:4});
    for(let i=enemies.length-1;i>=0;i--){
      let e=enemies[i];
      if(ptSegDist(e.x,e.y,bx,by,ex,ey)<(e.size+10)){
        let d=Math.max(0,dmg-e.armor+(t.armorPierce||0));
        if(t.executeThresh&&e.hp/e.maxHp<t.executeThresh) d=e.hp+1;
        e.hp-=d;
        if(t.splash) enemies.forEach(ne=>{ if(ne!==e&&Math.hypot(ne.x-e.x,ne.y-e.y)<=t.splash) ne.hp-=d*0.4; });
        createParticles(e.x,e.y,"#3b82f6",7);
        if(e.hp<=0) killEnemy(i,e);
      }
    }
  }
}

function checkGameOver(){
  if(playerHp<=0){
    playerHp=0; gameIsOver=true;
    document.getElementById("go-stats-render").innerHTML=`Waves Completed: <b>${wave}</b><br>Score: <b>${score}</b>`;
    document.getElementById("game-over-layer").style.display="flex";
  }
}

// ============================================================
// DRAWING
// ============================================================
function draw(){
  let m=MAPS[currentMapIndex];
  ctx.fillStyle=m.bg; ctx.fillRect(0,0,canvas.width,canvas.height);

  // Pebbles
  if(graphicsPreset!=="low"){
    ctx.fillStyle="rgba(0,0,0,0.05)";
    pebbles.forEach(p=>{ ctx.beginPath(); ctx.arc(p.x+1.5,p.y+1.5,p.size,0,Math.PI*2); ctx.fill(); });
  }
  ctx.fillStyle=m.roadColor;
  pebbles.forEach(p=>{ ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); });

  // Path
  ctx.lineWidth=46; ctx.strokeStyle=m.roadColor; ctx.lineCap="round"; ctx.lineJoin="round";
  ctx.beginPath();
  let pts=m.path;
  ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
  ctx.stroke();
  if(graphicsPreset==="high"||graphicsPreset==="ultra"){
    ctx.strokeStyle="rgba(0,0,0,0.06)"; ctx.lineWidth=44; ctx.stroke();
    // Path edge lines
    ctx.strokeStyle="rgba(0,0,0,0.1)"; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
    ctx.stroke();
  }

  // Grass tufts
  if(graphicsPreset==="ultra"&&m.decorType!=="rock"){
    ctx.strokeStyle="rgba(0,0,0,0.14)"; ctx.lineWidth=1.2;
    grassTufts.forEach(g=>{
      g.blades.forEach(b=>{
        ctx.beginPath(); ctx.moveTo(g.x,g.y);
        ctx.quadraticCurveTo(g.x+b.curve,g.y+b.dy/2,g.x+b.dx,g.y+b.dy);
        ctx.stroke();
      });
    });
  }

  // Decorations
  environmentDecorations.forEach(d=>{
    ctx.save();
    if(graphicsPreset!=="low"){
      ctx.fillStyle="rgba(0,0,0,0.18)";
      ctx.beginPath(); ctx.arc(d.x+d.size*0.25,d.y+d.size*0.25,d.size,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle=d.color;
    if(d.type==="tree"){ ctx.beginPath(); ctx.arc(d.x,d.y,d.size,0,Math.PI*2); ctx.fill(); }
    else if(d.type==="pine"){
      ctx.beginPath(); ctx.moveTo(d.x,d.y-d.size); ctx.lineTo(d.x-d.size*0.8,d.y+d.size*0.8); ctx.lineTo(d.x+d.size*0.8,d.y+d.size*0.8); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(d.x,d.y-d.size*0.5); ctx.lineTo(d.x-d.size*1.1,d.y+d.size*1.1); ctx.lineTo(d.x+d.size*1.1,d.y+d.size*1.1); ctx.closePath(); ctx.fill();
    }
    else{ ctx.beginPath(); ctx.arc(d.x,d.y,d.size*0.75,0,Math.PI*2); ctx.fill(); }
    ctx.restore();
  });

  // Tower placement preview under cursor
  if(selectedTowerType&&isMouseOnCanvas){
    let cfg=TOWER_TYPES[selectedTowerType];
    let rng=cfg.range;
    let blocked=isOnPath(mouseX,mouseY,36)||isOnDecoration(mouseX,mouseY)||towers.some(t=>Math.hypot(t.x-mouseX,t.y-mouseY)<46);
    ctx.save();
    // Range circle
    ctx.fillStyle=blocked?"rgba(245,101,101,0.12)":"rgba(66,153,225,0.1)";
    ctx.strokeStyle=blocked?"#f56565":"#3182ce";
    ctx.lineWidth=1.5; ctx.setLineDash([6,4]);
    ctx.beginPath(); ctx.arc(mouseX,mouseY,rng,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.setLineDash([]);
    // Draw preview tower
    if(graphicsPreset!=="low"){
      ctx.fillStyle="rgba(0,0,0,0.15)"; ctx.beginPath(); ctx.arc(mouseX+3,mouseY+3,20,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=0.7;
    ctx.fillStyle=blocked?"rgba(245,101,101,0.8)":cfg.color;
    ctx.strokeStyle="#fff"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(mouseX,mouseY,20,0,Math.PI*2); ctx.fill(); ctx.stroke();
    // Preview barrel
    ctx.save(); ctx.translate(mouseX,mouseY);
    ctx.fillStyle="rgba(100,100,100,0.8)";
    ctx.fillRect(0,-cfg.barrelW/2,cfg.barrelLen,cfg.barrelW);
    ctx.restore();
    // Emoji label
    ctx.globalAlpha=1; ctx.font="bold 13px Arial"; ctx.textAlign="center";
    ctx.fillStyle=blocked?"#f56565":"#fff";
    ctx.fillText(blocked?"✕ Blocked":cfg.emoji+" "+cfg.name,mouseX,mouseY-28);
    ctx.restore();
  }

  // Selected tower range
  if(selectedTowerObj){
    let cfg=TOWER_TYPES[selectedTowerObj.type];
    let rng=cfg.range*(selectedTowerObj.rangeMult||1);
    ctx.save(); ctx.fillStyle="rgba(107,70,193,0.06)"; ctx.strokeStyle="#805ad5"; ctx.lineWidth=1.5; ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.arc(selectedTowerObj.x,selectedTowerObj.y,rng,0,Math.PI*2); ctx.fill(); ctx.stroke(); ctx.restore();
  }

  // Towers
  towers.forEach(t=>{
    let cfg=TOWER_TYPES[t.type];
    ctx.save();
    if(graphicsPreset!=="low"){ ctx.fillStyle="rgba(0,0,0,0.2)"; ctx.beginPath(); ctx.arc(t.x+3,t.y+3,22,0,Math.PI*2); ctx.fill(); }
    ctx.fillStyle=cfg.color;
    let isSelected=t===selectedTowerObj;
    ctx.strokeStyle=isSelected?"#fff":"rgba(255,255,255,0.3)"; ctx.lineWidth=isSelected?3:2;
    ctx.beginPath(); ctx.arc(t.x,t.y,20,0,Math.PI*2); ctx.fill(); ctx.stroke();
    // Upgrade glow
    let upgCount=(t.upgrades||[]).length;
    if(upgCount>0){
      ctx.strokeStyle=`hsla(${45+upgCount*25},100%,60%,0.6)`; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(t.x,t.y,23+upgCount,0,Math.PI*2); ctx.stroke();
    }
    // Barrel
    ctx.save(); ctx.translate(t.x,t.y); ctx.rotate(t.angle);
    let recoilOff=t.recoil||0;
    ctx.fillStyle=currentTheme==="dark"?"#4a5568":"#718096";
    ctx.strokeStyle="rgba(0,0,0,0.3)"; ctx.lineWidth=1;
    if(cfg.isVortex||cfg.isBarrier){
      // Draw special shapes
      for(let r=0;r<3;r++){ ctx.strokeStyle=cfg.color; ctx.lineWidth=2+r; ctx.globalAlpha=0.4-r*0.1; ctx.beginPath(); ctx.arc(0,0,8+r*7,0,Math.PI*2); ctx.stroke(); }
      ctx.globalAlpha=1;
    } else if(cfg.isOracle){
      ctx.strokeStyle="#fbbf24"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,12,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle="#fbbf24"; ctx.font="bold 14px Arial"; ctx.textAlign="center"; ctx.fillText("👁️",0,5);
    } else {
      ctx.fillRect(-2-recoilOff,-cfg.barrelW/2,cfg.barrelLen,cfg.barrelW);
      ctx.strokeRect(-2-recoilOff,-cfg.barrelW/2,cfg.barrelLen,cfg.barrelW);
    }
    ctx.restore();
    // Tower emoji
    if(graphicsPreset!=="low"){
      ctx.font="11px Arial"; ctx.textAlign="center"; ctx.fillStyle="rgba(255,255,255,0.9)";
      ctx.fillText(cfg.emoji,t.x,t.y+4);
    }
    ctx.restore();
  });

  // Laser beams
  towers.forEach(t=>{
    if(!TOWER_TYPES[t.type].isLaser&&!TOWER_TYPES[t.type].isFlame) return;
    let cfg=TOWER_TYPES[t.type];
    let rng=cfg.range*(t.rangeMult||1);
    let validTargets=enemies.filter(e=>Math.hypot(e.x-t.x,e.y-t.y)<=rng);
    if(!validTargets.length) return;
    if(t.priority==="first") validTargets.sort((a,b)=>b.dist-a.dist);
    let tgt=validTargets[0];
    ctx.save();
    if(TOWER_TYPES[t.type].isLaser){
      let alpha=0.7+Math.sin(internalTicker*0.4)*0.3;
      ctx.strokeStyle=`rgba(239,68,68,${alpha})`; ctx.lineWidth=3+Math.sin(internalTicker*0.3);
      ctx.shadowColor="#ef4444"; ctx.shadowBlur=12;
      ctx.beginPath(); ctx.moveTo(t.x+Math.cos(t.angle)*cfg.barrelLen,t.y+Math.sin(t.angle)*cfg.barrelLen);
      ctx.lineTo(tgt.x,tgt.y); ctx.stroke();
    }
    ctx.restore();
  });

  // Lightning visuals
  lightningVisuals.forEach(lv=>{
    ctx.save(); ctx.strokeStyle=lv.color; ctx.lineWidth=Math.max(0.5,lv.width*(lv.life/8));
    ctx.shadowColor=lv.color; ctx.shadowBlur=8;
    lv.segs.forEach(s=>{ ctx.beginPath(); ctx.moveTo(s.x1,s.y1); ctx.lineTo(s.x2,s.y2); ctx.stroke(); });
    ctx.restore();
  });

  // Projectiles
  projectiles.forEach(p=>{
    ctx.save();
    let col=p.isFrost?"#22d3ee":p.type==="plasma"||p.type==="mortar"?"#f97316":p.type==="nuke"?"#ef4444":p.type==="missile"?"#6366f1":"#e2e8f0";
    let sz=p.type==="plasma"||p.type==="mortar"||p.type==="nuke"?10:p.type==="missile"?7:5;
    if(graphicsPreset!=="low"){ ctx.shadowColor=col; ctx.shadowBlur=8; }
    ctx.fillStyle=col; ctx.beginPath(); ctx.arc(p.x,p.y,sz,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Muzzle flashes
  muzzleFlashes.forEach(f=>{
    ctx.save(); ctx.translate(f.x,f.y); ctx.rotate(f.angle);
    ctx.fillStyle=f.color; ctx.globalAlpha=f.life/f.maxLife;
    if(graphicsPreset!=="low"){ ctx.shadowColor=f.color; ctx.shadowBlur=10; }
    ctx.beginPath(); ctx.moveTo(0,-f.size/2); ctx.lineTo(f.size,0); ctx.lineTo(0,f.size/2); ctx.closePath(); ctx.fill();
    ctx.restore();
  });

  // Enemies
  enemies.forEach(e=>{
    ctx.save();
    let bob=Math.sin(internalTicker*0.18*e.speed)*2.5;
    let sway=Math.cos(internalTicker*0.12*e.speed)*0.1;
    ctx.translate(e.x,e.y+bob); ctx.rotate(sway);
    if(graphicsPreset!=="low"){ ctx.fillStyle="rgba(0,0,0,0.2)"; ctx.beginPath(); ctx.arc(2,2,e.size,0,Math.PI*2); ctx.fill(); }
    // Phase effect
    if(e.phase){ ctx.globalAlpha=0.55+Math.sin(internalTicker*0.15)*0.25; }
    ctx.fillStyle=e.color;
    ctx.beginPath(); ctx.arc(0,0,e.size,0,Math.PI*2); ctx.fill();
    // Armor glow
    if(e.armor>0){ ctx.strokeStyle="rgba(200,200,200,0.5)"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,0,e.size+1,0,Math.PI*2); ctx.stroke(); }
    // Slow overlay
    if(e.slowTimer>0){ ctx.fillStyle="rgba(6,182,212,0.3)"; ctx.beginPath(); ctx.arc(0,0,e.size+2,0,Math.PI*2); ctx.fill(); }
    // Burn overlay
    if(e.burnTimer>0){ ctx.fillStyle="rgba(255,100,0,0.3)"; ctx.beginPath(); ctx.arc(0,0,e.size+1,0,Math.PI*2); ctx.fill(); }
    // Poison overlay
    if(e.poisonTimer>0){ ctx.fillStyle="rgba(132,204,22,0.3)"; ctx.beginPath(); ctx.arc(0,0,e.size+1,0,Math.PI*2); ctx.fill(); }
    ctx.globalAlpha=1; ctx.restore();
    // HP bar
    if(e.hp<e.maxHp||e.type==="megaboss"){
      let bw=e.size*2.2, bh=4;
      ctx.fillStyle="rgba(0,0,0,0.5)"; ctx.fillRect(e.x-bw/2,e.y-e.size-10,bw,bh);
      let pct=Math.max(0,e.hp/e.maxHp);
      ctx.fillStyle=pct>0.5?"#48bb78":pct>0.25?"#ed8936":"#f56565";
      ctx.fillRect(e.x-bw/2,e.y-e.size-10,bw*pct,bh);
    }
  });

  // Particles
  particles.forEach(pt=>{
    ctx.save(); ctx.fillStyle=pt.color; ctx.globalAlpha=Math.max(0,pt.life/24);
    if(graphicsPreset==="ultra"){ ctx.shadowColor=pt.color; ctx.shadowBlur=4; }
    ctx.fillRect(pt.x,pt.y,pt.size,pt.size); ctx.restore();
  });

  // Floating texts
  floatingTexts.forEach(ft=>{
    ctx.save(); ctx.fillStyle=ft.color; ctx.globalAlpha=Math.max(0,ft.life/50);
    ctx.font="bold 14px 'Segoe UI',Arial"; ctx.textAlign="center"; ctx.fillText(ft.text,ft.x,ft.y); ctx.restore();
  });

  // Wave banner
  if(bannerTimer>0){
    let a=Math.min(1,bannerTimer/20);
    ctx.save(); ctx.fillStyle=`rgba(0,0,0,${a*0.82})`; ctx.fillRect(0,canvas.height/2-50,canvas.width,100);
    ctx.font="bold 38px 'Segoe UI',Arial"; ctx.fillStyle=`rgba(255,255,255,${a})`; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(bannerText,canvas.width/2,canvas.height/2); ctx.restore();
  }
}

// ============================================================
// GAME LOOP
// ============================================================
function masterLoop(){
  if(!gameIsOver&&!gameIsVictory){
    for(let s=0;s<gameSpeed;s++){
      updateLogic();
      checkGameOver();
    }
  }
  draw(); requestAnimationFrame(masterLoop);
}

// ============================================================
// INIT
// ============================================================
window.addEventListener("click",initAudio,{once:true});
applyTheme("dark");
generateDecorations();
buildShop();
updateUI();
masterLoop();
</script>
